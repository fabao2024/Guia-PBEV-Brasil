name: Manutenção Mensal de Dados

on:
  schedule:
    - cron: '0 12 1 * *'   # Todo dia 1 do mês às 09:00 BRT (UTC-3)
  workflow_dispatch:        # Permite disparar manualmente para testar

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Job 1: Atualiza preços ANP automaticamente ───────────────────────────────
  update-fuel-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Atualizar preços combustível (ANP)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-anp-prices.mjs
        continue-on-error: true   # Não bloqueia o lembrete se a ANP estiver fora

  # ── Job 2: Verifica nova tabela PBEV ────────────────────────────────────────
  check-pbev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verificar nova tabela PBEV/INMETRO
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-pbev-update.mjs
        continue-on-error: true   # Sites do governo são instáveis

  # ── Job 3: Issue de lembrete com checklist ───────────────────────────────────
  create-maintenance-issue:
    runs-on: ubuntu-latest
    needs: [update-fuel-prices, check-pbev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar issue de manutenção mensal
        uses: actions/github-script@v7
        with:
          script-path: .github/scripts/create-maintenance-issue.mjs
