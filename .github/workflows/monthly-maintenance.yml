name: Manutenção Mensal de Dados

on:
  schedule:
    - cron: '0 12 1 * *' # Dia 1, 09:00 BRT
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monthly-data-maintenance
  cancel-in-progress: false

jobs:
  update-fuel-prices:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Atualizar preços combustível (ANP)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-anp-prices.mjs

  check-pbev:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Verificar nova tabela PBEV/INMETRO
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-pbev-update.mjs

  update-aneel-tariffs:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Atualizar tarifas energia elétrica (ANEEL B1)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-aneel-tariffs.mjs

  create-maintenance-issue:
    needs: [update-fuel-prices, check-pbev, update-aneel-tariffs]
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Verificar links das marcas
        run: node .github/scripts/check-brand-links.mjs
        continue-on-error: true

      - name: Monitorar notícias de novos EVs (RSS)
        run: node .github/scripts/check-ev-news.mjs
        continue-on-error: true

      - name: Criar issue de manutenção mensal
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fn = require('./.github/scripts/create-maintenance-issue.cjs');
            await fn({ github, context });
