name: Lembrete de Manutenção Mensal

on:
  schedule:
    - cron: '0 12 1 * *'   # Todo dia 1 do mês às 09:00 BRT (UTC-3)
  workflow_dispatch:        # Permite disparar manualmente para testar

permissions:
  issues: write

jobs:
  create-maintenance-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Criar issue de manutenção mensal
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const mes = now.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric', timeZone: 'America/Sao_Paulo' });
            const mesAbrev = now.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit', timeZone: 'America/Sao_Paulo' }).replace('. ', '/').replace('.', '');

            const body = `## Checklist de manutenção — ${mes}

Aberto automaticamente no dia 1 de cada mês. Feche esta issue após concluir as verificações.

---

### 🚗 Catálogo de veículos
- [ ] Verificar se há novos EVs no mercado brasileiro (sites das marcas, PBEV, notícias)
- [ ] Atualizar preços alterados em \`src/constants.ts\` (campo \`price\`)
- [ ] Para cada preço alterado, adicionar entrada em \`src/constants/priceHistory.ts\`:
  \`\`\`ts
  "Modelo": [
    { date: 'YYYY-MM-anterior', price: NNN },
    { date: '${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}', price: NNN_NOVO },
  ]
  \`\`\`
- [ ] Marcar veículos descontinuados com \`discontinued: true\`
- [ ] Atualizar contagem de veículos no README se houve adição/remoção

---

### ⛽ Preços de combustível (ANP)
- [ ] Consultar última pesquisa semanal ANP: https://www.gov.br/anp/pt-br/assuntos/precos-e-defesa-da-concorrencia/precos/precos-revenda-e-de-distribuicao-combustiveis/serie-historica-do-levantamento-de-precos
- [ ] Atualizar médias estaduais em \`src/constants/fuelPricesByState.ts\`
- [ ] Atualizar \`FUEL_PRICES_UPDATED\` para \`'${mesAbrev}'\`

---

### ⚡ Tarifas de energia elétrica (ANEEL)
- [ ] Consultar tarifas residenciais (B1) atualizadas: https://www.aneel.gov.br/tarifas-de-distribuicao
- [ ] Atualizar valores em \`src/constants/electricityPricesByState.ts\`
- [ ] Atualizar \`ELECTRICITY_PRICES_UPDATED\` para \`'${mesAbrev}'\`

---

### 🏛️ IPVA por estado
- [ ] Verificar se algum estado alterou alíquota para EVs ou combustão (mudanças são anuais, geralmente em jan/fev)
- [ ] Se houver alteração: atualizar \`src/constants/ipvaByState.ts\` (campos \`bevRate\` e/ou \`standardRate\`)
- [ ] Atualizar \`IPVA_DATA_UPDATED\` se houve mudança

---

### 📋 Tabela PBEV/INMETRO
- [ ] Verificar se saiu nova tabela PBEV: https://www.pbev.gov.br
- [ ] Se nova tabela: extrair com \`pdfplumber\` e atualizar campos \`range\`, \`pbeRating\`, \`energyMJkm\` nos veículos alterados

---

### 🔗 Links e afiliados
- [ ] Verificar se links das marcas em \`BRAND_URLS\` estão funcionando
- [ ] Verificar status do afiliado Trendseg

---

### ✅ Após concluir
- [ ] \`npm run test:run\` — todos os testes passando
- [ ] \`npm run build\` — build limpo
- [ ] Commit com mensagem \`chore(data): atualização mensal ${mesAbrev}\`
- [ ] Fechar esta issue
`;

            // Ensure labels exist (create silently if missing)
            for (const [name, color, desc] of [
              ['manutenção', '0075ca', 'Tarefas de manutenção periódica de dados'],
              ['dados',      'e4e669', 'Atualização de dados do catálogo'],
            ]) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description: desc });
              } catch (_) { /* label já existe — ignorar */ }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔧 Manutenção mensal — ${mes}`,
              body,
              labels: ['manutenção', 'dados'],
            });
