name: Weekly EV Suggestions

on:
  schedule:
    - cron: '0 12 * * 1' # Segunda-feira, 09:00 BRT
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-ev-suggestions
  cancel-in-progress: false

jobs:
  process-suggestions:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Process EV suggestions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/process-ev-suggestions.mjs
