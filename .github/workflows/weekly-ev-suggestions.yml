name: Weekly EV Suggestions

on:
  schedule:
    - cron: '0 12 * * 1'   # Toda segunda-feira às 09:00 BRT (12:00 UTC)
  workflow_dispatch:         # Permite rodar manualmente

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-suggestions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Process EV suggestions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/process-ev-suggestions.mjs
