<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Guia PBEV Brasil</title>
  <script>
    // GitHub Pages SPA fallback
    // Redirects unknown routes to index.html preserving the path
    // Pre-rendered pages (e.g., /carro/byd-dolphin-gs) have their own index.html
    // and won't hit this fallback.
    var segmentCount = 0; // no segments to keep from path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
